<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saisie des élèves — CCF</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #4a6cf7; --green: #1D9E75; --red: #e24b4a;
    --bg: #f7f6f3; --card: #fff; --border: #e2e0d8;
    --text: #2c2c2a; --muted: #888780;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; min-height: 100vh; }

  h1 { font-size: 15px; font-weight: 700; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid var(--blue); display: flex; align-items: center; gap: 8px; }
  h1 .badge { font-size: 11px; font-weight: 600; background: #e8ecfe; color: #2d4ecc; border-radius: 4px; padding: 2px 8px; }

  #notice { background: #faeeda; border: 1px solid #f5c47566; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #633806; margin-bottom: 14px; display: none; }

  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  select, input[type="text"], input[type="number"] {
    width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px;
    font-size: 14px; color: var(--text); background: var(--card); outline: none; transition: border-color 0.15s;
  }
  select:focus, input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(74,108,247,0.1); }
  select.error, input.error { border-color: var(--red); }
  .error-msg { font-size: 11px; color: #a32d2d; margin-top: 3px; display: none; }
  .error-msg.visible { display: block; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-row { display: flex; gap: 8px; margin-top: 18px; }
  .btn { border: none; border-radius: 6px; font-size: 14px; font-weight: 600; padding: 9px 18px; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--blue); color: #fff; flex: 1; }
  .btn-secondary { background: #f1efe8; color: var(--muted); border: 1.5px solid var(--border); }

  /* Compteur */
  #counter { font-size: 12px; color: var(--muted); margin-top: 4px; text-align: right; }

  /* Liste récente */
  .recent-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 24px 0 10px; }
  .eleve-list { display: flex; flex-direction: column; gap: 6px; }
  .eleve-item { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .eleve-item .nom { font-weight: 600; color: #1a1a18; }
  .eleve-item .meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .eleve-item .pill { font-size: 11px; font-weight: 700; background: #e8ecfe; color: #2d4ecc; border-radius: 4px; padding: 2px 7px; }
  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 16px 0; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: transform 0.25s, opacity 0.25s; pointer-events: none; z-index: 100; }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.ok { background: var(--green); color: #fff; }
  #toast.err { background: var(--red); color: #fff; }
</style>
</head>
<body>

<div id="notice">⚠ Mode démonstration — Grist non connecté.</div>

<h1>
  👨‍🎓 Nouvel élève
  <span class="badge" id="classe-badge">—</span>
</h1>

<div class="form-group">
  <label for="classe">Classe</label>
  <select id="classe" onchange="onClasseChange()">
    <option value="">Choisir une classe…</option>
  </select>
  <div class="error-msg" id="err-classe">Sélectionne une classe.</div>
</div>

<div class="form-group">
  <label for="nom">Nom et prénom</label>
  <input type="text" id="nom" placeholder="ex. DUPONT Jean" autocomplete="off">
  <div class="error-msg" id="err-nom">Le nom est obligatoire.</div>
</div>

<div class="row2">
  <div class="form-group">
    <label for="numero">N° d'ordre</label>
    <input type="number" id="numero" min="1" max="40" placeholder="1">
    <div class="error-msg" id="err-numero">Numéro invalide (1–40).</div>
  </div>
  <div id="counter">— élèves dans cette classe</div>
</div>

<div class="btn-row">
  <button class="btn btn-secondary" onclick="resetForm()">Effacer</button>
  <button class="btn btn-primary" id="btn-save" onclick="sauvegarder()">Enregistrer l'élève</button>
</div>

<div class="recent-title">Ajouts de cette session</div>
<div class="eleve-list" id="eleve-list">
  <div class="empty-state">Aucun élève ajouté pour l'instant.</div>
</div>

<div id="toast"></div>

<script>
/* ── État ── */
let gristConnecte = false;
let classes = [];
let elevesSaisis = [];

/* ── Init Grist ── */
function chargerDonnees() {
  if (gristConnecte) return;
  gristConnecte = true;
  document.getElementById("notice").style.display = "none";

  grist.docApi.fetchTable("Classes").then(data => {
    classes = [];
    if (data && data.id) {
      for (let i = 0; i < data.id.length; i++) {
        classes.push({
          id: data.id[i],
          code: data.code_classe[i],
          session: data.session ? data.session[i] : "",
        });
      }
    }
    peuplerSelectClasse();
  }).catch(e => {
    console.error("Erreur chargement Classes:", e);
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  });
}

function chargerDemoMode() {
  gristConnecte = false;
  classes = [
    { id: 1, code: "TBAER",  session: 2026 },
    { id: 2, code: "1BAER",  session: 2027 },
    { id: 3, code: "1BMVA1", session: 2027 },
    { id: 4, code: "1BMVA2", session: 2027 },
    { id: 5, code: "CAP1",   session: 2026 },
    { id: 6, code: "CAP2",   session: 2026 }
  ];
  peuplerSelectClasse();
}

function initGrist() {
  if (typeof grist !== "undefined") {
    grist.ready({ requiredAccess: "full" });
    grist.onOptions(() => { if (!gristConnecte) chargerDonnees(); });
    grist.onRecord(() => { if (!gristConnecte) chargerDonnees(); });
    [1000, 2000, 3500].forEach(d => setTimeout(() => { if (!gristConnecte) chargerDonnees(); }, d));
  } else {
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  }
}

/* ── Select classe ── */
function peuplerSelectClasse() {
  const sel = document.getElementById("classe");
  sel.innerHTML = '<option value="">Choisir une classe…</option>';
  classes.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = c.code + (c.session ? "  ·  " + c.session : "");
    sel.appendChild(opt);
  });
}

function onClasseChange() {
  const classeId = document.getElementById("classe").value;
  const sel = classes.find(c => c.id == classeId);
  document.getElementById("classe-badge").textContent = sel ? sel.code : "—";

  // Compteur élèves dans cette classe
  const nb = elevesSaisis.filter(e => e.classeId == classeId).length;
  document.getElementById("counter").textContent = nb > 0
    ? nb + " élève" + (nb > 1 ? "s" : "") + " ajouté" + (nb > 1 ? "s" : "") + " dans cette classe"
    : "— élèves dans cette classe";

  // Proposer le prochain numéro
  const maxNum = elevesSaisis
    .filter(e => e.classeId == classeId)
    .reduce((max, e) => Math.max(max, e.numero), 0);
  document.getElementById("numero").value = maxNum > 0 ? maxNum + 1 : "";

  clearError("classe");
}

/* ── Validation ── */
function valider() {
  let ok = true;
  const classe = document.getElementById("classe").value;
  const nom    = document.getElementById("nom").value.trim();
  const numero = parseInt(document.getElementById("numero").value);

  if (!classe) { showError("classe"); ok = false; } else clearError("classe");
  if (!nom)    { showError("nom");    ok = false; } else clearError("nom");

  if (!numero || numero < 1 || numero > 40) {
    document.getElementById("err-numero").textContent = "Numéro invalide (1–40).";
    showError("numero"); ok = false;
  } else {
    const doublon = elevesSaisis.find(e => e.classeId == classe && e.numero == numero);
    if (doublon) {
      document.getElementById("err-numero").textContent = "Le n° " + numero + " est déjà pris par " + doublon.nom + ".";
      showError("numero"); ok = false;
    } else clearError("numero");
  }

  return ok ? { classeId: classe, nom, numero } : null;
}

function showError(id) {
  document.getElementById(id)?.classList.add("error");
  document.getElementById("err-" + id)?.classList.add("visible");
}
function clearError(id) {
  document.getElementById(id)?.classList.remove("error");
  const errEl = document.getElementById("err-" + id);
  if (errEl) errEl.classList.remove("visible");
}

/* ── Sauvegarde ── */
async function sauvegarder() {
  const data = valider();
  if (!data) return;

  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "Enregistrement…";

  const classeObj = classes.find(c => c.id == data.classeId);

  try {
    if (gristConnecte) {
      await grist.docApi.applyUserActions([["AddRecord", "Eleves", null, {
        nom_prenom:   data.nom,
        classe:       parseInt(data.classeId),
        numero_ordre: data.numero
      }]]);
    }

    elevesSaisis.push({
      classeId: data.classeId,
      classeCode: classeObj ? classeObj.code : data.classeId,
      nom: data.nom,
      numero: data.numero
    });

    afficherListe();
    toast("✓ " + data.nom + " ajouté", "ok");
    resetForm(false);
    document.getElementById("classe").dispatchEvent(new Event("change"));

  } catch(e) {
    toast("Erreur d'enregistrement", "err");
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = "Enregistrer l'élève";
}

/* ── Reset ── */
function resetForm(clearClasse = true) {
  if (clearClasse) {
    document.getElementById("classe").value = "";
    document.getElementById("classe-badge").textContent = "—";
    document.getElementById("counter").textContent = "— élèves dans cette classe";
  }
  document.getElementById("nom").value = "";
  document.getElementById("numero").value = "";
  ["classe", "nom", "numero"].forEach(clearError);
}

/* ── Liste session ── */
function afficherListe() {
  const container = document.getElementById("eleve-list");
  if (!elevesSaisis.length) {
    container.innerHTML = '<div class="empty-state">Aucun élève ajouté pour l\'instant.</div>';
    return;
  }
  const recents = [...elevesSaisis].reverse().slice(0, 8);
  container.innerHTML = recents.map(e => `
    <div class="eleve-item">
      <div>
        <div class="nom">${e.nom}</div>
        <div class="meta">N° ${e.numero}</div>
      </div>
      <span class="pill">${e.classeCode}</span>
    </div>
  `).join("");
}

/* ── Toast ── */
function toast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "show " + type;
  setTimeout(() => { t.className = ""; }, 2500);
}

document.addEventListener("DOMContentLoaded", initGrist);
</script>
</body>
</html>
