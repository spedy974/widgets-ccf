<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Équipe enseignante — CCF</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --card: #fff; --border: #e2e0d8;
    --text: #2c2c2a; --muted: #888780;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }

  #notice { background: #faeeda; border: 1px solid #f5c47566; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #633806; margin-bottom: 14px; display: none; }

  /* HEADER */
  .page-header { margin-bottom: 20px; }
  .page-header h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .page-header .sub { font-size: 12px; color: var(--muted); }

  /* STATS */
  .stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-pill { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; color: var(--muted); }
  .stat-pill strong { color: var(--text); }

  /* FILTRES */
  .filtres { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .filtre-btn { padding: 5px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--card); color: var(--muted); transition: all 0.15s; }
  .filtre-btn:hover { border-color: #4a6cf7; color: #4a6cf7; }
  .filtre-btn.active { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }

  /* GRILLE MATIÈRES */
  .matieres-grid { display: flex; flex-direction: column; gap: 16px; }

  .matiere-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

  .matiere-header { padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
  .matiere-color-bar { width: 4px; height: 32px; border-radius: 2px; flex-shrink: 0; }
  .matiere-nom { font-size: 14px; font-weight: 700; }
  .matiere-count { margin-left: auto; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }

  /* ENSEIGNANTS */
  .enseignants-list { padding: 0 12px 12px; display: flex; flex-wrap: wrap; gap: 10px; }

  .ens-card { display: flex; align-items: flex-start; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; flex: 1; min-width: 220px; max-width: 320px; transition: box-shadow 0.15s; }
  .ens-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #d3d1c7; }

  .ens-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }

  .ens-info .nom { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .ens-info .role-badge { display: inline-block; font-size: 10px; font-weight: 700; border-radius: 3px; padding: 1px 5px; margin-top: 3px; }

  /* COULEURS PAR MATIÈRE */
  .m-maths    { --mc: #4a6cf7; --ml: #e8ecfe; --mt: #2d4ecc; }
  .m-sciences { --mc: #1D9E75; --ml: #e0f5ee; --mt: #0d6e50; }
  .m-lettres  { --mc: #e24b4a; --ml: #fee2e2; --mt: #991b1b; }
  .m-anglais  { --mc: #f59e0b; --ml: #fef3c7; --mt: #92400e; }
  .m-arts     { --mc: #7c3aed; --ml: #f3e8ff; --mt: #6d28d9; }
  .m-atelier  { --mc: #0891b2; --ml: #e0f2fe; --mt: #155e75; }
  .m-pse      { --mc: #059669; --ml: #d1fae5; --mt: #065f46; }
  .m-hg       { --mc: #d97706; --ml: #fef3c7; --mt: #92400e; }
  .m-autre    { --mc: #888780; --ml: #f1efe8; --mt: #5f5e5a; }
  .m-rrupn    { --mc: #1a1a18; --ml: #f1efe8; --mt: #1a1a18; }

  .matiere-section { --mc: #888780; --ml: #f1efe8; --mt: #5f5e5a; }

  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 32px; }
</style>
</head>
<body>

<div id="notice">⚠ Mode démonstration — Grist non connecté.</div>

<div class="page-header">
  <h1>Équipe enseignante CCF</h1>
  <div class="sub">Lycée Polyvalent Gérard Ethève — 2026-2027</div>
</div>

<div class="stats-row" id="stats-row"></div>
<div class="filtres" id="filtres"></div>
<div class="matieres-grid" id="matieres-grid"></div>

<script>
let gristConnecte = false;
let enseignants = [], affectations = [], epreuves = [];
let filtreCourant = 'tous';

const MATIERES_CONFIG = {
  "Maths-Sciences":  { classe: "m-maths",   label: "Maths & Sciences physiques" },
  "Mathématiques":   { classe: "m-maths",   label: "Mathématiques" },
  "Sciences":        { classe: "m-sciences", label: "Sciences physiques" },
  "Lettres-Histoire":{ classe: "m-lettres",  label: "Lettres & Histoire-Géo" },
  "Français":        { classe: "m-lettres",  label: "Français" },
  "Anglais":         { classe: "m-anglais",  label: "Langue vivante (Anglais)" },
  "Arts appliqués":  { classe: "m-arts",     label: "Arts appliqués" },
  "Atelier MVA":     { classe: "m-atelier",  label: "Atelier — Maintenance Véhicules" },
  "Atelier AERO":    { classe: "m-atelier",  label: "Atelier — Aéronautique" },
  "PSE":             { classe: "m-pse",      label: "Prévention, Santé, Environnement" },
  "RRUPN":           { classe: "m-rrupn",    label: "Administration & Numérique" },
  "Direction":       { classe: "m-rrupn",    label: "Direction" },
};

const ROLE_COLORS = {
  "RRUPN":                  { bg: "#1a1a18", text: "#fff" },
  "Chef secrétariat examen":{ bg: "#4a6cf7", text: "#fff" },
  "Direction":              { bg: "#7c3aed", text: "#fff" },
  "Enseignant":             { bg: "#e8ecfe", text: "#2d4ecc" },
};

function getConfig(matiere) {
  for (const [key, val] of Object.entries(MATIERES_CONFIG)) {
    if (matiere && matiere.toLowerCase().includes(key.toLowerCase())) return val;
  }
  return { classe: "m-autre", label: matiere || "Autre" };
}

function initiales(nom) {
  if (!nom) return "?";
  return nom.trim().split(/\s+/).filter(p => p === p.toUpperCase() || p.length > 2).slice(0, 2).map(p => p[0]).join("").toUpperCase() || nom.slice(0, 2).toUpperCase();
}

function couleurAvatar(matiere) {
  const cfg = getConfig(matiere);
  const map = {
    "m-maths":    ["#4a6cf7","#e8ecfe","#2d4ecc"],
    "m-sciences": ["#1D9E75","#e0f5ee","#0d6e50"],
    "m-lettres":  ["#e24b4a","#fee2e2","#991b1b"],
    "m-anglais":  ["#f59e0b","#fef3c7","#92400e"],
    "m-arts":     ["#7c3aed","#f3e8ff","#6d28d9"],
    "m-atelier":  ["#0891b2","#e0f2fe","#155e75"],
    "m-pse":      ["#059669","#d1fae5","#065f46"],
    "m-hg":       ["#d97706","#fef3c7","#92400e"],
    "m-rrupn":    ["#1a1a18","#f1efe8","#1a1a18"],
    "m-autre":    ["#888780","#f1efe8","#5f5e5a"],
  };
  return map[cfg.classe] || map["m-autre"];
}

/* ══ INIT ══ */
function chargerDonnees() {
  if (gristConnecte) return;
  gristConnecte = true;
  document.getElementById("notice").style.display = "none";

  // Chargement direct sans listTables pour éviter les blocages
  grist.docApi.fetchTable("Enseignants").then(ens => {
    enseignants = parseTable(ens);
    console.log("Enseignants chargés:", enseignants.length);

    // Charger affectations en parallèle (optionnel — ne bloque pas si absent)
    const loadAff = grist.docApi.listTables()
      .then(tables => {
        const nomAff = tables.find(t => t.toLowerCase().includes("affectation")) || "AffectationEnseignants";
        return grist.docApi.fetchTable(nomAff);
      })
      .catch(() => null);

    return loadAff;
  }).then(aff => {
    if (aff) affectations = parseTable(aff);
    rendreTout();
  }).catch(e => {
    console.error("Erreur chargement Enseignants:", e);
    gristConnecte = false;
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  });
}

function parseTable(data) {
  if (!data || !data.id) return [];
  const keys = Object.keys(data);
  return data.id.map((id, i) => {
    const obj = { id };
    keys.forEach(k => { if (k !== 'id') obj[k] = data[k][i]; });
    return obj;
  });
}

function initGrist() {
  if (typeof grist !== "undefined") {
    grist.ready({ requiredAccess: "full" });
    grist.onOptions(() => { if (!gristConnecte) chargerDonnees(); });
    grist.onRecord(() => { if (!gristConnecte) chargerDonnees(); });
    [1000, 2000, 3500].forEach(d => setTimeout(() => { if (!gristConnecte) chargerDonnees(); }, d));
  } else {
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  }
}

function chargerDemoMode() {
  enseignants = [
    { id: 1, nom_prenom: "ETHEVE Joseph Expédit", email_academique: "expedit.etheve@ac-reunion.fr", role: "RRUPN", matiere_principale: "Maths-Sciences" },
    { id: 2, nom_prenom: "LIEGEOIS Cyrille", email_academique: "cyrille.liegeois@ac-reunion.fr", role: "Enseignant", matiere_principale: "Maths-Sciences" },
    { id: 3, nom_prenom: "CHETANNEAU Claire", email_academique: "claire.chetanneau@ac-reunion.fr", role: "Enseignant", matiere_principale: "Lettres-Histoire" },
    { id: 4, nom_prenom: "BOULANGER Jean", email_academique: "jean.boulanger@ac-reunion.fr", role: "Enseignant", matiere_principale: "Atelier MVA" },
    { id: 5, nom_prenom: "MARTIN Sophie", email_academique: "sophie.martin@ac-reunion.fr", role: "Enseignant", matiere_principale: "Anglais" },
    { id: 6, nom_prenom: "DUBOIS Paul", email_academique: "paul.dubois@ac-reunion.fr", role: "Enseignant", matiere_principale: "Atelier AERO" },
    { id: 7, nom_prenom: "ARTHEMISE Jean-Hugues", email_academique: "jh.arthemise@ac-reunion.fr", role: "Direction", matiere_principale: "Direction" },
  ];
  affectations = [];
  epreuves = [];
  rendreTout();
}

/* ══ RENDU ══ */
function rendreTout() {
  // Grouper par matière
  const groupes = {};
  enseignants.forEach(e => {
    const mat = e.matiere_principale || "Autre";
    if (!groupes[mat]) groupes[mat] = [];
    groupes[mat].push(e);
  });

  // Stats
  const statsEl = document.getElementById("stats-row");
  statsEl.innerHTML = `
    <div class="stat-pill"><strong>${enseignants.length}</strong> enseignants</div>
    <div class="stat-pill"><strong>${Object.keys(groupes).length}</strong> matières</div>
    <div class="stat-pill"><strong>${enseignants.filter(e => e.role === "RRUPN" || e.role === "Chef secrétariat examen").length}</strong> administrateur(s)</div>
  `;

  // Filtres
  const filtresEl = document.getElementById("filtres");
  filtresEl.innerHTML = `<button class="filtre-btn ${filtreCourant === 'tous' ? 'active' : ''}" onclick="filtrer('tous', this)">Tous</button>`;
  Object.keys(groupes).sort().forEach(mat => {
    const cfg = getConfig(mat);
    filtresEl.innerHTML += `<button class="filtre-btn ${filtreCourant === mat ? 'active' : ''}" onclick="filtrer('${mat.replace(/'/g,"\\'")}', this)">${cfg.label}</button>`;
  });

  // Grille
  const grille = document.getElementById("matieres-grid");
  const matieresFiltrees = filtreCourant === 'tous' ? Object.keys(groupes) : Object.keys(groupes).filter(m => m === filtreCourant);

  if (!matieresFiltrees.length) {
    grille.innerHTML = '<div class="empty-state">Aucun enseignant trouvé.</div>';
    return;
  }

  grille.innerHTML = matieresFiltrees.sort().map(mat => {
    const ensListe = groupes[mat];
    const cfg = getConfig(mat);
    const colors = couleurAvatar(mat);

    const ensCartes = ensListe.map(e => {
      const init = initiales(e.nom_prenom);
      const roleStyle = ROLE_COLORS[e.role] || ROLE_COLORS["Enseignant"];
      const nbAff = affectations.filter(a => a.enseignant === e.id).length;
      return `
        <div class="ens-card">
          <div class="ens-avatar" style="background:${colors[1]};color:${colors[2]};border:2px solid ${colors[0]}20">${init}</div>
          <div class="ens-info" style="flex:1;min-width:0">
            <div class="nom" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.nom_prenom}</div>
            <div style="margin-top:3px">
              <a href="mailto:${e.email_academique || ''}"
                 style="font-size:11px;color:${colors[0]};text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px"
                 title="${e.email_academique || ''}"
                 onmouseover="this.style.textDecoration='underline'"
                 onmouseout="this.style.textDecoration='none'">
                ${e.email_academique || '—'}
              </a>
            </div>
            <div style="display:flex;gap:4px;align-items:center;margin-top:4px;flex-wrap:wrap">
              <span class="role-badge" style="background:${roleStyle.bg};color:${roleStyle.text}">${e.role}</span>
              ${nbAff > 0 ? `<span style="font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 6px">${nbAff} classe${nbAff > 1 ? 's' : ''}</span>` : ''}
            </div>
          </div>
        </div>`;
    }).join("");

    return `
      <div class="matiere-section">
        <div class="matiere-header" style="background:${couleurAvatar(mat)[1]}20;border-bottom:1px solid var(--border)">
          <div class="matiere-color-bar" style="background:${couleurAvatar(mat)[0]}"></div>
          <div class="matiere-nom" style="color:${couleurAvatar(mat)[2]}">${cfg.label}</div>
          <div class="matiere-count" style="background:${couleurAvatar(mat)[1]};color:${couleurAvatar(mat)[2]}">${ensListe.length} enseignant${ensListe.length > 1 ? 's' : ''}</div>
        </div>
        <div class="enseignants-list">${ensCartes}</div>
      </div>`;
  }).join("");
}

function filtrer(mat, btn) {
  filtreCourant = mat;
  document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rendreTout();
}

document.addEventListener("DOMContentLoaded", initGrist);
</script>
</body>
</html>
