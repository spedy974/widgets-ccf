<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Équipe enseignante CCF</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --card: #fff; --border: #e2e0d8;
    --text: #2c2c2a; --muted: #888780;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; background: var(--bg); color: var(--text); padding: 16px; }

  #notice { background: #faeeda; border: 1px solid #f5c47566; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #633806; margin-bottom: 12px; display: none; }

  .page-header { margin-bottom: 16px; }
  .page-header h1 { font-size: 16px; font-weight: 800; margin-bottom: 3px; }
  .page-header .sub { font-size: 12px; color: var(--muted); }

  /* STATS */
  .stats-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .stat-pill { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: var(--muted); }
  .stat-pill strong { color: var(--text); }

  /* FILTRES */
  .filtres { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .filtre-btn { padding: 4px 12px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; background: var(--card); color: var(--muted); transition: all 0.15s; white-space: nowrap; }
  .filtre-btn:hover { border-color: #4a6cf7; color: #4a6cf7; }
  .filtre-btn.active { color: #fff; border-color: transparent; }

  /* TABLE PRINCIPALE */
  .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

  table.main-table { width: 100%; border-collapse: collapse; }

  table.main-table thead th {
    background: #eaf3de;
    padding: 8px 14px;
    font-size: 11px; font-weight: 700; color: #2d6a1e;
    text-transform: uppercase; letter-spacing: 0.05em;
    text-align: left; border-bottom: 2px solid #c8e6a0;
  }

  /* LIGNE MATIÈRE */
  tr.matiere-row td {
    padding: 0;
    border-top: 2px solid var(--border);
  }
  tr.matiere-row:first-child td { border-top: none; }

  .matiere-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    font-weight: 800; font-size: 13px;
  }
  .mat-bar { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; }
  .mat-count { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-left: auto; }

  /* LIGNES ENSEIGNANTS */
  tr.ens-row td {
    padding: 7px 14px;
    border-bottom: 1px solid #f1efe8;
    vertical-align: middle;
  }
  tr.ens-row:last-child td { border-bottom: none; }
  tr.ens-row:hover td { background: var(--bg); }

  /* CELLULE NOM */
  .nom-cell { display: flex; align-items: center; gap: 8px; padding-left: 24px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
  .nom-info .nom { font-weight: 600; font-size: 13px; }
  .nom-info .email { font-size: 11px; text-decoration: none; display: block; margin-top: 1px; }
  .nom-info .email:hover { text-decoration: underline; }

  /* BADGES */
  .badge { display: inline-block; font-size: 10px; font-weight: 700; border-radius: 4px; padding: 2px 6px; }
  .b-rrupn  { background: #1a1a18; color: #fff; }
  .b-dir    { background: #7c3aed; color: #fff; }
  .b-chef   { background: #4a6cf7; color: #fff; }
  .b-ens    { background: #e8ecfe; color: #2d4ecc; }

  /* CLASSES */
  .classes-cell { display: flex; flex-wrap: wrap; gap: 4px; }
  .cls-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .no-cls { font-size: 11px; color: #b4b2a9; font-style: italic; }

  .empty-state { text-align: center; color: var(--muted); padding: 32px; font-size: 13px; }

  /* Colonne largeurs */
  .col-nom   { width: 42%; }
  .col-role  { width: 18%; }
  .col-cls   { width: 40%; }
</style>
</head>
<body>

<div id="notice">⚠ Mode démonstration — Grist non connecté.</div>

<div class="page-header">
  <h1>👩‍🏫 Équipe enseignante CCF</h1>
  <div class="sub">Lycée Polyvalent Gérard Ethève — 2026-2027</div>
</div>

<div class="stats-row" id="stats-row"></div>
<div class="filtres" id="filtres"></div>
<div id="contenu"></div>

<script>
let gristConnecte = false;
let enseignants = [], affectations = [], classes = [];
let filtreCourant = 'tous';

/* ══ PALETTE COULEURS ══ */
const PALETTE = [
  ["#4a6cf7","#e8ecfe","#2d4ecc"],   // bleu
  ["#1D9E75","#e0f5ee","#0d6e50"],   // vert
  ["#e24b4a","#fee2e2","#991b1b"],   // rouge
  ["#f59e0b","#fef3c7","#78350f"],   // ambre
  ["#7c3aed","#f3e8ff","#6d28d9"],   // violet
  ["#0891b2","#e0f2fe","#155e75"],   // cyan
  ["#059669","#d1fae5","#065f46"],   // émeraude
  ["#d97706","#fef3c7","#92400e"],   // orange
  ["#db2777","#fce7f3","#9d174d"],   // rose
  ["#0284c7","#e0f2fe","#075985"],   // bleu ciel
  ["#6366f1","#eef2ff","#4338ca"],   // indigo
  ["#64748b","#f1f5f9","#334155"],   // ardoise
];
const matColors = {};
let paletteIdx = 0;
function couleur(mat) {
  if (!matColors[mat]) matColors[mat] = PALETTE[paletteIdx++ % PALETTE.length];
  return matColors[mat];
}

function roleBadge(role) {
  const r = (role || "").toLowerCase();
  if (r.includes("rrupn"))          return `<span class="badge b-rrupn">RRUPN</span>`;
  if (r.includes("direction"))      return `<span class="badge b-dir">Direction</span>`;
  if (r.includes("chef")||r.includes("secr")) return `<span class="badge b-chef">Secrétariat</span>`;
  return `<span class="badge b-ens">Enseignant</span>`;
}

function initiales(nom) {
  if (!nom) return "?";
  const parts = nom.trim().split(/\s+/);
  const maj = parts.filter(p => p.length > 1 && p === p.toUpperCase());
  const min = parts.find(p => p !== p.toUpperCase());
  if (maj.length && min) return (min[0] + maj[0][0]).toUpperCase();
  return parts.slice(0,2).map(p=>p[0]).join("").toUpperCase();
}

/* ══ GRIST ══ */
function chargerDonnees() {
  if (gristConnecte) return;
  gristConnecte = true;
  document.getElementById("notice").style.display = "none";

  grist.docApi.fetchTable("Enseignants").then(ens => {
    enseignants = parseTable(ens);
    return grist.docApi.listTables();
  }).then(tables => {
    const nomAff = tables.find(t => t.toLowerCase().includes("affectation")) || "AffectationEnseignants";
    return Promise.all([
      grist.docApi.fetchTable(nomAff),
      grist.docApi.fetchTable("Classes"),
    ]);
  }).then(([aff, cls]) => {
    affectations = parseTable(aff);
    classes = parseTable(cls);
    rendreTout();
  }).catch(e => {
    console.error(e);
    gristConnecte = false;
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  });
}

function parseTable(data) {
  if (!data || !data.id) return [];
  const keys = Object.keys(data);
  return data.id.map((id, i) => {
    const obj = { id };
    keys.forEach(k => { if (k !== 'id') obj[k] = data[k][i]; });
    return obj;
  });
}

function initGrist() {
  if (typeof grist !== "undefined") {
    grist.ready({ requiredAccess: "full" });
    grist.onOptions(() => { if (!gristConnecte) chargerDonnees(); });
    grist.onRecord(() => { if (!gristConnecte) chargerDonnees(); });
    [1000, 2000, 3500].forEach(d => setTimeout(() => { if (!gristConnecte) chargerDonnees(); }, d));
  } else {
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  }
}

function chargerDemoMode() {
  enseignants = [
    { id: 1, nom_prenom: "Betancourt Carlos", email_academique: "carlos.betancourt@ac-reunion.fr", role: "Direction", matiere: "Génie méca const" },
    { id: 2, nom_prenom: "Boulanger Daniel", email_academique: "daniel.boulanger@ac-reunion.fr", role: "Enseignant", matiere: "Génie méca const" },
    { id: 3, nom_prenom: "Boutier Vanessa", email_academique: "vanessa.boutier@ac-reunion.fr", role: "Enseignant", matiere: "Lettres-Anglais" },
    { id: 4, nom_prenom: "Lucas Evelyne", email_academique: "evelyne.lucas@ac-reunion.fr", role: "Enseignant", matiere: "Lettres-Anglais" },
    { id: 5, nom_prenom: "Boyer Gérard", email_academique: "gerard.boyer@ac-reunion.fr", role: "Enseignant", matiere: "Maintenance-aéro" },
    { id: 6, nom_prenom: "Loria Toni", email_academique: "toni.loria@ac-reunion.fr", role: "Enseignant", matiere: "Maintenance-aéro" },
    { id: 7, nom_prenom: "Etheve Expédit", email_academique: "expedit.etheve@ac-reunion.fr", role: "RRUPN", matiere: "Maths-sciences" },
    { id: 8, nom_prenom: "Fabiani Patrice", email_academique: "patrice.fabiani@ac-reunion.fr", role: "Enseignant", matiere: "Maths-sciences" },
    { id: 9, nom_prenom: "Viry Séverine", email_academique: "severine.viry@ac-reunion.fr", role: "Enseignant", matiere: "Maths-sciences" },
    { id: 10, nom_prenom: "Joseph Loïc", email_academique: "loic.joseph@ac-reunion.fr", role: "Enseignant", matiere: "Arts App." },
    { id: 11, nom_prenom: "Lauret Sandrine", email_academique: "sandrine.lauret@ac-reunion.fr", role: "Enseignant", matiere: "PSE" },
    { id: 12, nom_prenom: "Cyrille Liegeois", email_academique: "cyrille.liegeois@ac-reunion.fr", role: "Enseignant", matiere: "Mathématiques" },
    { id: 13, nom_prenom: "Claire Chetanneau", email_academique: "claire.chetanneau@ac-reunion.fr", role: "Enseignant", matiere: "EPS" },
  ];
  classes = [
    { id: 1, code_classe: "TBAER" }, { id: 2, code_classe: "1BAER" },
    { id: 3, code_classe: "1BMVA1" }, { id: 4, code_classe: "CAP1" },
  ];
  affectations = [
    { id: 1, enseignant: 7, classe: 1 }, { id: 2, enseignant: 7, classe: 2 },
    { id: 3, enseignant: 8, classe: 3 }, { id: 4, enseignant: 3, classe: 1 },
    { id: 5, enseignant: 9, classe: 4 },
  ];
  rendreTout();
}

/* ══ RENDU ══ */
function rendreTout() {
  // Grouper par matiere (champ exact de la table Enseignants)
  const groupes = {};
  enseignants.forEach(e => {
    const mat = e.matiere || e.matiere_principale || "Non renseigné";
    if (!groupes[mat]) groupes[mat] = [];
    groupes[mat].push(e);
  });

  // Trier par nombre décroissant puis alphabétique
  const mats = Object.keys(groupes).sort((a, b) =>
    groupes[b].length !== groupes[a].length
      ? groupes[b].length - groupes[a].length
      : a.localeCompare(b)
  );

  // Classes par enseignant
  const clsParEns = {};
  affectations.forEach(aff => {
    if (!clsParEns[aff.enseignant]) clsParEns[aff.enseignant] = [];
    const cls = classes.find(c => c.id === aff.classe);
    if (cls && !clsParEns[aff.enseignant].includes(cls.code_classe)) {
      clsParEns[aff.enseignant].push(cls.code_classe);
    }
  });

  // Stats
  const sansAff = enseignants.filter(e => !clsParEns[e.id] || !clsParEns[e.id].length).length;
  document.getElementById("stats-row").innerHTML = `
    <div class="stat-pill"><strong>${enseignants.length}</strong> enseignants</div>
    <div class="stat-pill"><strong>${mats.length}</strong> matières</div>
    <div class="stat-pill"><strong>${affectations.length}</strong> affectations</div>
    ${sansAff > 0 ? `<div class="stat-pill" style="background:#faeeda;border-color:#f5c47566;color:#633806"><strong>${sansAff}</strong> sans classe</div>` : ''}
  `;

  // Filtres
  const filtresEl = document.getElementById("filtres");
  filtresEl.innerHTML = `<button class="filtre-btn active" style="background:#4a6cf7;color:#fff;border-color:#4a6cf7" onclick="filtrer('tous',this,'#4a6cf7')">Toutes (${enseignants.length})</button>`;
  mats.forEach(mat => {
    const c = couleur(mat);
    filtresEl.innerHTML += `<button class="filtre-btn"
      onmouseover="if(!this.classList.contains('active')){this.style.borderColor='${c[0]}';this.style.color='${c[0]}'}"
      onmouseout="if(!this.classList.contains('active')){this.style.borderColor='';this.style.color=''}"
      onclick="filtrer('${mat.replace(/'/g,"\\'")}',this,'${c[0]}')">${mat} (${groupes[mat].length})</button>`;
  });

  // Table principale
  const matsFiltrees = filtreCourant === 'tous' ? mats : mats.filter(m => m === filtreCourant);

  if (!matsFiltrees.length) {
    document.getElementById("contenu").innerHTML = '<div class="empty-state">Aucun enseignant trouvé.</div>';
    return;
  }

  let rows = '';
  matsFiltrees.forEach(mat => {
    const c = couleur(mat);
    const ensListe = groupes[mat].sort((a,b) => a.nom_prenom.localeCompare(b.nom_prenom));

    // Ligne en-tête matière (fusionnée sur 3 colonnes)
    rows += `<tr class="matiere-row">
      <td colspan="3">
        <div class="matiere-header" style="background:${c[1]}60">
          <div class="mat-bar" style="background:${c[0]}"></div>
          <span style="color:${c[2]}">${mat}</span>
          <span class="mat-count" style="background:${c[1]};color:${c[2]}">${ensListe.length} enseignant${ensListe.length>1?'s':''}</span>
        </div>
      </td>
    </tr>`;

    // Lignes enseignants
    ensListe.forEach(e => {
      const init = initiales(e.nom_prenom);
      const clsEns = clsParEns[e.id] || [];
      const clsBadges = clsEns.length > 0
        ? clsEns.map(cls => `<span class="cls-tag" style="background:${c[1]};color:${c[2]}">${cls}</span>`).join('')
        : `<span class="no-cls">Non affecté</span>`;

      rows += `<tr class="ens-row">
        <td class="col-nom">
          <div class="nom-cell">
            <div class="avatar" style="background:${c[1]};color:${c[2]}">${init}</div>
            <div class="nom-info">
              <div class="nom">${e.nom_prenom}</div>
              <a class="email" href="mailto:${e.email_academique||''}" style="color:${c[0]}">
                ✉ ${e.email_academique||'—'}
              </a>
            </div>
          </div>
        </td>
        <td class="col-role">${roleBadge(e.role)}</td>
        <td class="col-cls"><div class="classes-cell">${clsBadges}</div></td>
      </tr>`;
    });
  });

  document.getElementById("contenu").innerHTML = `
    <div class="table-wrapper">
      <table class="main-table">
        <thead>
          <tr>
            <th class="col-nom">Nom et Prénom</th>
            <th class="col-role">Rôle</th>
            <th class="col-cls">Classes affectées</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function filtrer(mat, btn, color) {
  filtreCourant = mat;
  document.querySelectorAll('.filtre-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = ''; b.style.color = ''; b.style.borderColor = '';
  });
  btn.classList.add('active');
  btn.style.background = color;
  btn.style.color = '#fff';
  btn.style.borderColor = color;
  rendreTout();
}

document.addEventListener("DOMContentLoaded", initGrist);
</script>
</body>
</html>
