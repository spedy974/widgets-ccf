<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Équipe enseignante — CCF</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --card: #fff; --border: #e2e0d8;
    --text: #2c2c2a; --muted: #888780;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; background: var(--bg); color: var(--text); padding: 16px; }

  #notice { background: #faeeda; border: 1px solid #f5c47566; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #633806; margin-bottom: 14px; display: none; }

  .page-header { margin-bottom: 20px; }
  .page-header h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .page-header .sub { font-size: 12px; color: var(--muted); }

  .stats-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .stat-pill { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; color: var(--muted); }
  .stat-pill strong { color: var(--text); }

  /* FILTRES */
  .filtres { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .filtre-btn { padding: 5px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--card); color: var(--muted); transition: all 0.15s; }
  .filtre-btn:hover { border-color: #4a6cf7; color: #4a6cf7; }
  .filtre-btn.active { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }

  /* SECTIONS MATIÈRE */
  .matieres-grid { display: flex; flex-direction: column; gap: 14px; }

  .matiere-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

  .matiere-header { padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .color-bar { width: 4px; height: 32px; border-radius: 2px; flex-shrink: 0; }
  .matiere-nom { font-size: 14px; font-weight: 700; flex: 1; }
  .matiere-count { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 10px; }

  /* CARTES ENSEIGNANTS */
  .enseignants-list { padding: 12px; display: flex; flex-wrap: wrap; gap: 10px; }

  .ens-card {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    flex: 1; min-width: 230px; max-width: 320px;
    transition: box-shadow 0.15s;
  }
  .ens-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #c8c6be; }

  .ens-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; flex-shrink: 0;
  }

  .ens-info { flex: 1; min-width: 0; }
  .ens-nom { font-size: 13px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }

  .ens-email {
    display: block; font-size: 11px; text-decoration: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 5px; transition: opacity 0.15s;
  }
  .ens-email:hover { opacity: 0.7; text-decoration: underline; }

  .ens-badges { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 10px; font-weight: 700; border-radius: 4px; padding: 2px 6px; }

  /* Épreuves dispensées */
  .ens-epreuves { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 3px; }
  .epreuve-tag { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; }

  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 32px; }
  .loading { text-align: center; color: var(--muted); font-size: 13px; padding: 40px; }
</style>
</head>
<body>

<div id="notice">⚠ Mode démonstration — Grist non connecté.</div>

<div class="page-header">
  <h1>👩‍🏫 Équipe enseignante CCF</h1>
  <div class="sub">Lycée Polyvalent Gérard Ethève — 2026-2027 — Regroupement par matière dispensée</div>
</div>

<div class="stats-row" id="stats-row"></div>
<div class="filtres" id="filtres"></div>
<div id="contenu"><div class="loading">Chargement…</div></div>

<script>
let gristConnecte = false;
let enseignants = [], affectations = [], epreuves = [], classes = [];
let filtreCourant = 'tous';

/* ══ COULEURS PAR MATIÈRE ══ */
function couleurMatiere(libelle) {
  const l = (libelle || "").toLowerCase();
  if (l.includes("math"))                          return ["#4a6cf7","#e8ecfe","#2d4ecc"];
  if (l.includes("physi") || l.includes("chimi") || l.includes("scien")) return ["#1D9E75","#e0f5ee","#0d6e50"];
  if (l.includes("franç") || l.includes("lettre") || l.includes("oral") || l.includes("écrit")) return ["#e24b4a","#fee2e2","#991b1b"];
  if (l.includes("histoi") || l.includes("géogr") || l.includes("emc")) return ["#d97706","#fef3c7","#92400e"];
  if (l.includes("angl") || l.includes("langue")) return ["#f59e0b","#fef3c7","#78350f"];
  if (l.includes("art"))                           return ["#7c3aed","#f3e8ff","#6d28d9"];
  if (l.includes("préventi") || l.includes("pse") || l.includes("santé")) return ["#059669","#d1fae5","#065f46"];
  if (l.includes("chef d") || l.includes("oeuvre")) return ["#0891b2","#e0f2fe","#155e75"];
  if (l.includes("intervent") || l.includes("réalisa") || l.includes("véhicule")) return ["#7c3aed","#ede9fe","#5b21b6"];
  if (l.includes("diagnost") || l.includes("mécan") || l.includes("pilot")) return ["#0284c7","#e0f2fe","#075985"];
  if (l.includes("inspecti") || l.includes("montage") || l.includes("essai") || l.includes("contrôle")) return ["#0891b2","#cffafe","#164e63"];
  if (l.includes("préparati") || l.includes("maintenance")) return ["#6366f1","#eef2ff","#4338ca"];
  return ["#888780","#f1efe8","#5f5e5a"];
}

const ROLE_COLORS = {
  "RRUPN":                   { bg: "#1a1a18", text: "#fff" },
  "Chef secrétariat examen": { bg: "#4a6cf7", text: "#fff" },
  "Direction":               { bg: "#7c3aed", text: "#fff" },
  "Enseignant":              { bg: "#e8ecfe", text: "#2d4ecc" },
};

function initiales(nom) {
  if (!nom) return "?";
  const parts = nom.trim().split(/\s+/);
  const majParts = parts.filter(p => p === p.toUpperCase() && p.length > 1);
  if (majParts.length >= 1) {
    const prenom = parts.find(p => p !== p.toUpperCase());
    return ((prenom ? prenom[0] : '') + majParts[0][0]).toUpperCase().slice(0,2);
  }
  return parts.slice(0,2).map(p => p[0]).join("").toUpperCase();
}

/* ══ INIT GRIST ══ */
function chargerDonnees() {
  if (gristConnecte) return;
  gristConnecte = true;
  document.getElementById("notice").style.display = "none";

  grist.docApi.fetchTable("Enseignants").then(ens => {
    enseignants = parseTable(ens);
    console.log("Enseignants chargés:", enseignants.length);

    return grist.docApi.listTables();
  }).then(tables => {
    const nomAff = tables.find(t => t.toLowerCase().includes("affectation")) || "AffectationEnseignants";
    return Promise.all([
      grist.docApi.fetchTable(nomAff),
      grist.docApi.fetchTable("ConfigEpreuves"),
      grist.docApi.fetchTable("Classes"),
    ]);
  }).then(([aff, epr, cls]) => {
    affectations = parseTable(aff);
    epreuves     = parseTable(epr);
    classes      = parseTable(cls);
    console.log("Affectations:", affectations.length, "Épreuves:", epreuves.length);
    rendreTout();
  }).catch(e => {
    console.error("Erreur:", e);
    gristConnecte = false;
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  });
}

function parseTable(data) {
  if (!data || !data.id) return [];
  const keys = Object.keys(data);
  return data.id.map((id, i) => {
    const obj = { id };
    keys.forEach(k => { if (k !== 'id') obj[k] = data[k][i]; });
    return obj;
  });
}

function initGrist() {
  if (typeof grist !== "undefined") {
    grist.ready({ requiredAccess: "full" });
    grist.onOptions(() => { if (!gristConnecte) chargerDonnees(); });
    grist.onRecord(() => { if (!gristConnecte) chargerDonnees(); });
    [1000, 2000, 3500].forEach(d => setTimeout(() => { if (!gristConnecte) chargerDonnees(); }, d));
  } else {
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  }
}

function chargerDemoMode() {
  enseignants = [
    { id: 1, nom_prenom: "ETHEVE Joseph Expédit", email_academique: "expedit.etheve@ac-reunion.fr", role: "RRUPN", matiere_principale: "Maths-Sciences" },
    { id: 2, nom_prenom: "LIEGEOIS Cyrille", email_academique: "cyrille.liegeois@ac-reunion.fr", role: "Enseignant", matiere_principale: "Maths-Sciences" },
    { id: 3, nom_prenom: "CHETANNEAU Claire", email_academique: "claire.chetanneau@ac-reunion.fr", role: "Enseignant", matiere_principale: "Lettres-Histoire" },
    { id: 4, nom_prenom: "BOULANGER Jean", email_academique: "jean.boulanger@ac-reunion.fr", role: "Enseignant", matiere_principale: "Atelier MVA" },
    { id: 5, nom_prenom: "MARTIN Sophie", email_academique: "sophie.martin@ac-reunion.fr", role: "Enseignant", matiere_principale: "Anglais" },
  ];
  epreuves = [
    { id: 1, repere: "E1-A", libelle: "Mathématiques", bloc_enseignement: "Général" },
    { id: 2, repere: "E1-B", libelle: "Sciences physiques", bloc_enseignement: "Général" },
    { id: 3, repere: "EG2", libelle: "Maths et physique-chimie", bloc_enseignement: "Général" },
    { id: 4, repere: "E4-A", libelle: "Langue vivante A écrite", bloc_enseignement: "Général" },
    { id: 5, repere: "EG1-A", libelle: "Français écrit", bloc_enseignement: "Général" },
    { id: 6, repere: "E3-A", libelle: "Réalisation d'intervention", bloc_enseignement: "Professionnel" },
  ];
  classes = [{ id: 1, code_classe: "TBAER" }, { id: 2, code_classe: "CAP1" }];
  affectations = [
    { id: 1, enseignant: 1, epreuve: 1, classe: 1 },
    { id: 2, enseignant: 1, epreuve: 2, classe: 1 },
    { id: 3, enseignant: 2, epreuve: 1, classe: 2 },
    { id: 4, enseignant: 2, epreuve: 3, classe: 2 },
    { id: 5, enseignant: 3, epreuve: 5, classe: 1 },
    { id: 6, enseignant: 4, epreuve: 6, classe: 1 },
    { id: 7, enseignant: 5, epreuve: 4, classe: 1 },
  ];
  rendreTout();
}

/* ══ RENDU ══ */
function rendreTout() {
  // Construire le regroupement combiné :
  // 1. Enseignants avec affectations → groupés par épreuve réelle
  // 2. Enseignants SANS affectation → groupés par matiere_principale
  const groupesParEpreuve = {};

  // Ensemble des IDs enseignants ayant au moins une affectation
  const ensAvecAff = new Set(affectations.map(a => a.enseignant));

  // 1. Regroupement via AffectationEnseignants
  affectations.forEach(aff => {
    const ens = enseignants.find(e => e.id === aff.enseignant);
    const epr = epreuves.find(e => e.id === aff.epreuve);
    if (!ens || !epr) return;

    const key = epr.libelle || epr.repere;
    if (!groupesParEpreuve[key]) {
      groupesParEpreuve[key] = { epreuve: epr, enseignants: new Map() };
    }
    if (!groupesParEpreuve[key].enseignants.has(ens.id)) {
      groupesParEpreuve[key].enseignants.set(ens.id, { enseignant: ens, classes: [] });
    }
    const cls = classes.find(c => c.id === aff.classe);
    if (cls) {
      groupesParEpreuve[key].enseignants.get(ens.id).classes.push(cls.code_classe);
    }
  });

  // 2. Enseignants SANS affectation → groupés par matiere_principale
  enseignants.forEach(ens => {
    if (ensAvecAff.has(ens.id)) return; // déjà traité
    const key = ens.matiere_principale || "Non affecté";
    if (!groupesParEpreuve[key]) {
      groupesParEpreuve[key] = {
        epreuve: { libelle: key, repere: "", bloc_enseignement: "" },
        enseignants: new Map()
      };
    }
    groupesParEpreuve[key].enseignants.set(ens.id, { enseignant: ens, classes: [] });
  });

  // Stats
  const nbMatieres = Object.keys(groupesParEpreuve).length;
  const nbEnsTotal = enseignants.length;
  const nbAffecter = ensAvecAff.size;
  const nbSansAff = nbEnsTotal - nbAffecter;
  document.getElementById("stats-row").innerHTML = `
    <div class="stat-pill"><strong>${nbEnsTotal}</strong> enseignant${nbEnsTotal > 1 ? 's' : ''}</div>
    <div class="stat-pill"><strong>${nbMatieres}</strong> groupe${nbMatieres > 1 ? 's' : ''}</div>
    <div class="stat-pill"><strong>${nbAffecter}</strong> affecté${nbAffecter > 1 ? 's' : ''}</div>
    ${nbSansAff > 0 ? `<div class="stat-pill" style="background:#faeeda;border-color:#f5c47566;color:#633806"><strong>${nbSansAff}</strong> sans affectation</div>` : ''}
  `;

  // Filtres
  const filtresEl = document.getElementById("filtres");
  filtresEl.innerHTML = `<button class="filtre-btn ${filtreCourant === 'tous' ? 'active' : ''}" onclick="filtrer('tous', this)">Toutes les matières</button>`;
  Object.keys(groupesParEpreuve).sort().forEach(key => {
    const colors = couleurMatiere(key);
    filtresEl.innerHTML += `
      <button class="filtre-btn ${filtreCourant === key ? 'active' : ''}"
        style="${filtreCourant === key ? `background:${colors[0]};color:#fff;border-color:${colors[0]}` : ''}"
        onclick="filtrer('${key.replace(/'/g,"\\'")}', this)">${key}</button>`;
  });

  // Grille
  const cles = filtreCourant === 'tous'
    ? Object.keys(groupesParEpreuve).sort()
    : Object.keys(groupesParEpreuve).filter(k => k === filtreCourant);

  const contenu = document.getElementById("contenu");

  if (!cles.length) {
    contenu.innerHTML = '<div class="empty-state">Aucune donnée trouvée.</div>';
    return;
  }

  contenu.innerHTML = `<div class="matieres-grid">${cles.map(key => {
    const groupe = groupesParEpreuve[key];
    const epr = groupe.epreuve;
    const colors = couleurMatiere(key);
    const ensListe = Array.from(groupe.enseignants.values());

    const cartes = ensListe.map(({ enseignant: e, classes: cls }) => {
      const init = initiales(e.nom_prenom);
      const roleStyle = ROLE_COLORS[e.role] || ROLE_COLORS["Enseignant"];
      const classesUniques = [...new Set(cls)];
      return `
        <div class="ens-card">
          <div class="ens-avatar" style="background:${colors[1]};color:${colors[2]};border:2px solid ${colors[0]}40">
            ${init}
          </div>
          <div class="ens-info">
            <div class="ens-nom">${e.nom_prenom}</div>
            <a class="ens-email" href="mailto:${e.email_academique || ''}"
               style="color:${colors[0]}" title="${e.email_academique || ''}">
              ✉ ${e.email_academique || '—'}
            </a>
            <div class="ens-badges">
              <span class="badge" style="background:${roleStyle.bg};color:${roleStyle.text}">${e.role}</span>
              ${classesUniques.length > 0
                ? classesUniques.map(c => `<span class="badge" style="background:${colors[1]};color:${colors[2]}">${c}</span>`).join('')
                : ''}
            </div>
          </div>
        </div>`;
    }).join("");

    return `
      <div class="matiere-section">
        <div class="matiere-header" style="background:${colors[1]}50">
          <div class="color-bar" style="background:${colors[0]}"></div>
          <div>
            <div class="matiere-nom" style="color:${colors[2]}">${key}</div>
            ${epr.repere ? `<div style="font-size:11px;color:${colors[0]};font-weight:600">Repère : ${epr.repere} · ${epr.bloc_enseignement || ''}</div>` : ''}
          </div>
          <div class="matiere-count" style="background:${colors[1]};color:${colors[2]}">
            ${ensListe.length} enseignant${ensListe.length > 1 ? 's' : ''}
          </div>
        </div>
        <div class="enseignants-list">${cartes}</div>
      </div>`;
  }).join("")}</div>`;
}

function filtrer(mat, btn) {
  filtreCourant = mat;
  document.querySelectorAll('.filtre-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.color = '';
    b.style.borderColor = '';
  });
  btn.classList.add('active');
  rendreTout();
}

document.addEventListener("DOMContentLoaded", initGrist);
</script>
</body>
</html>
