<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dépôt de documents CCF</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    background: #f7f6f3;
    color: #2c2c2a;
    padding: 16px;
    min-height: 100vh;
  }

  h1 {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a18;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 2px solid #4a6cf7;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  h1 .icon { font-size: 18px; }

  .form-group { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: #5f5e5a;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }

  select, input[type="date"], textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #d3d1c7;
    border-radius: 6px;
    font-size: 14px;
    color: #2c2c2a;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }

  select:focus, input[type="date"]:focus, textarea:focus {
    border-color: #4a6cf7;
    box-shadow: 0 0 0 3px rgba(74,108,247,0.1);
  }

  select.error, input.error { border-color: #e24b4a; }

  .error-msg {
    font-size: 11px;
    color: #a32d2d;
    margin-top: 3px;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* Recherche élèves */
  .eleves-container {
    border: 1.5px solid #d3d1c7;
    border-radius: 6px;
    background: #fff;
    overflow: hidden;
  }

  .eleves-search {
    display: flex;
    align-items: center;
    padding: 7px 10px;
    border-bottom: 1px solid #e8e6de;
    gap: 6px;
  }

  .eleves-search input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 13px;
    color: #2c2c2a;
    background: transparent;
  }

  .eleves-search .search-icon { color: #b4b2a9; font-size: 14px; }

  .eleves-list {
    max-height: 160px;
    overflow-y: auto;
    padding: 4px 0;
  }

  .eleve-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 13px;
  }

  .eleve-option:hover { background: #f1efe8; }

  .eleve-option input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: #4a6cf7;
    flex-shrink: 0;
  }

  .eleve-option.checked { background: #eef1fe; }

  .eleves-empty {
    padding: 16px;
    text-align: center;
    color: #b4b2a9;
    font-size: 13px;
  }

  /* Tags élèves sélectionnés */
  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
    min-height: 0;
  }

  .tag {
    background: #e8ecfe;
    color: #2d4ecc;
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tag button {
    background: none;
    border: none;
    cursor: pointer;
    color: #2d4ecc;
    font-size: 13px;
    padding: 0;
    line-height: 1;
  }

  .tag button:hover { color: #a32d2d; }

  /* Compteur */
  .eleves-count {
    font-size: 11px;
    color: #888780;
    margin-top: 4px;
  }

  textarea {
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
  }

  /* Boutons */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  button#btn-save {
    background: #4a6cf7;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    cursor: pointer;
    flex: 1;
    transition: opacity 0.15s;
  }

  button#btn-save:hover { opacity: 0.88; }
  button#btn-save:disabled { background: #b4b2a9; cursor: not-allowed; }

  button#btn-reset {
    background: #f1efe8;
    color: #5f5e5a;
    border: 1.5px solid #d3d1c7;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 16px;
    cursor: pointer;
  }

  button#btn-reset:hover { background: #e8e6de; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: transform 0.25s, opacity 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { background: #1D9E75; color: #fff; }
  #toast.error-t { background: #a32d2d; color: #fff; }

  /* Notice */
  #notice {
    background: #faeeda;
    border: 1px solid #f5c47566;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: #633806;
    margin-bottom: 14px;
    display: none;
  }

  /* Séparateur */
  .divider {
    border: none;
    border-top: 1px solid #e8e6de;
    margin: 16px 0;
  }
</style>
</head>
<body>

<div id="notice">⚠ Mode démonstration — Grist non connecté.</div>

<h1><span class="icon">📁</span> Déclarer un dépôt de documents CCF</h1>

<div class="form-group">
  <label for="sel-classe">Classe</label>
  <select id="sel-classe">
    <option value="">Choisir une classe…</option>
  </select>
  <div class="error-msg" id="err-classe">Sélectionne une classe.</div>
</div>

<div class="form-group">
  <label for="sel-epreuve">Épreuve</label>
  <select id="sel-epreuve">
    <option value="">Choisir une épreuve…</option>
  </select>
  <div class="error-msg" id="err-epreuve">Sélectionne une épreuve.</div>
</div>

<div class="form-group">
  <label for="sel-enseignant">Enseignant</label>
  <select id="sel-enseignant">
    <option value="">Choisir un enseignant…</option>
  </select>
  <div class="error-msg" id="err-enseignant">Sélectionne un enseignant.</div>
</div>

<div class="form-group">
  <label for="date-depot">Date de dépôt</label>
  <input type="date" id="date-depot">
  <div class="error-msg" id="err-date">La date est obligatoire.</div>
</div>

<hr class="divider">

<div class="form-group">
  <label>Élèves absents / abandon (eleves_AB)</label>
  <div class="eleves-container">
    <div class="eleves-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-eleve" placeholder="Rechercher un élève…" disabled>
    </div>
    <div class="eleves-list" id="eleves-list">
      <div class="eleves-empty">Sélectionne d'abord une classe.</div>
    </div>
  </div>
  <div class="selected-tags" id="selected-tags"></div>
  <div class="eleves-count" id="eleves-count"></div>
</div>

<div class="form-group">
  <label for="commentaire">Commentaire</label>
  <textarea id="commentaire" placeholder="Observations, remarques…"></textarea>
</div>

<div class="btn-row">
  <button id="btn-reset" onclick="resetForm()">Effacer</button>
  <button id="btn-save" onclick="sauvegarder()">Enregistrer le dépôt</button>
</div>

<div id="toast"></div>

<script>
/* ── État global ── */
let classes = [];
let epreuves = [];
let enseignants = [];
let elevesAll = [];       // tous les élèves chargés
let elevesClasse = [];    // élèves filtrés selon classe sélectionnée
let selectedEleves = [];  // {id, nom}
let gristConnecte = false;

/* ── Init Grist ── */
function chargerDonnees() {
  gristConnecte = true;
  document.getElementById("notice").style.display = "none";
  Promise.all([
    grist.docApi.fetchTable("Classes"),
    grist.docApi.fetchTable("ConfigEpreuves"),
    grist.docApi.fetchTable("Enseignants"),
    grist.docApi.fetchTable("Eleves")
  ]).then(([cls, epr, ens, elv]) => {
    // Classes
    classes = [];
    if (cls && cls.code_classe) {
      for (let i = 0; i < cls.id.length; i++) {
        classes.push({ id: cls.id[i], code: cls.code_classe[i] });
      }
    }
    // ConfigEpreuves
    epreuves = [];
    if (epr && epr.repere) {
      for (let i = 0; i < epr.id.length; i++) {
        epreuves.push({ id: epr.id[i], label: epr.repere[i] + " — " + epr.libelle[i] });
      }
    }
    // Enseignants
    enseignants = [];
    if (ens && ens.nom_prenom) {
      for (let i = 0; i < ens.id.length; i++) {
        enseignants.push({ id: ens.id[i], nom: ens.nom_prenom[i] });
      }
    }
    // Élèves — on garde id, nom, et l'id de classe (référence)
    elevesAll = [];
    if (elv && elv.nom_prenom) {
      for (let i = 0; i < elv.id.length; i++) {
        // la colonne Reference vers Classes peut s'appeler 'classe' ou autre
        const classeRef = elv.classe ? elv.classe[i] : (elv.la_classe ? elv.la_classe[i] : null);
        elevesAll.push({ id: elv.id[i], nom: elv.nom_prenom[i], classeId: classeRef });
      }
    }
    peuplerSelects();
  }).catch((e) => {
    console.error("Erreur fetchTable:", e);
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  });
}

function initGrist() {
  if (typeof grist !== "undefined") {
    grist.ready({ requiredAccess: "full" });
    grist.onOptions(function() {
      chargerDonnees();
    });
    setTimeout(() => {
      if (!gristConnecte) chargerDonnees();
    }, 1500);
  } else {
    document.getElementById("notice").style.display = "block";
    chargerDemoMode();
  }
}

function chargerDemoMode() {
  classes = [
    { id: 1, code: "TBAER" }, { id: 2, code: "1BAER" },
    { id: 3, code: "1BMVA1" }, { id: 4, code: "1BMVA2" },
    { id: 5, code: "CAP1" }, { id: 6, code: "CAP2" }
  ];
  epreuves = [
    { id: 1, label: "E1-A — Mathématiques" },
    { id: 2, label: "E1-B — Sciences physiques et chimiques" },
    { id: 3, label: "EG2 — Mathématiques et physique-chimie" }
  ];
  enseignants = [
    { id: 1, nom: "ETHEVE Joseph Expédit" },
    { id: 2, nom: "Boulanger Jean" }
  ];
  elevesAll = [
    { id: 1, nom: "DUPONT Lucas", classeId: 1 },
    { id: 2, nom: "MARTIN Emma", classeId: 1 },
    { id: 3, nom: "BERNARD Noah", classeId: 1 },
    { id: 4, nom: "LEROY Maxime", classeId: 2 },
    { id: 5, nom: "MOREAU Jade", classeId: 2 },
    { id: 6, nom: "FONTAINE Jules", classeId: 5 },
    { id: 7, nom: "CHEVALLIER Lina", classeId: 5 },
    { id: 8, nom: "PERRIN Rose", classeId: 5 }
  ];
  peuplerSelects();
}

/* ── Peupler les selects ── */
function peuplerSelects() {
  const selClasse = document.getElementById("sel-classe");
  classes.forEach(c => {
    const o = document.createElement("option");
    o.value = c.id; o.textContent = c.code;
    selClasse.appendChild(o);
  });

  const selEpr = document.getElementById("sel-epreuve");
  epreuves.forEach(e => {
    const o = document.createElement("option");
    o.value = e.id; o.textContent = e.label;
    selEpr.appendChild(o);
  });

  const selEns = document.getElementById("sel-enseignant");
  enseignants.forEach(e => {
    const o = document.createElement("option");
    o.value = e.id; o.textContent = e.nom;
    selEns.appendChild(o);
  });

  // Date par défaut = aujourd'hui
  document.getElementById("date-depot").valueAsDate = new Date();
}

/* ── Filtrage élèves selon classe ── */
document.getElementById("sel-classe").addEventListener("change", function() {
  const classeId = parseInt(this.value);
  selectedEleves = [];
  afficherTags();

  if (!classeId) {
    elevesClasse = [];
    document.getElementById("eleves-list").innerHTML =
      '<div class="eleves-empty">Sélectionne d\'abord une classe.</div>';
    document.getElementById("search-eleve").disabled = true;
    document.getElementById("search-eleve").value = "";
    return;
  }

  elevesClasse = elevesAll
    .filter(e => e.classeId === classeId)
    .sort((a, b) => a.nom.localeCompare(b.nom));

  document.getElementById("search-eleve").disabled = false;
  document.getElementById("search-eleve").value = "";
  afficherListeEleves(elevesClasse);
  clearError("classe");
});

/* ── Recherche en temps réel ── */
document.getElementById("search-eleve").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  const filtres = q
    ? elevesClasse.filter(e => e.nom.toLowerCase().includes(q))
    : elevesClasse;
  afficherListeEleves(filtres);
});

function afficherListeEleves(liste) {
  const container = document.getElementById("eleves-list");
  if (!liste.length) {
    container.innerHTML = '<div class="eleves-empty">Aucun élève trouvé.</div>';
    return;
  }
  container.innerHTML = liste.map(e => {
    const checked = selectedEleves.some(s => s.id === e.id);
    return `
      <label class="eleve-option ${checked ? 'checked' : ''}" onclick="toggleEleve(${e.id}, '${e.nom.replace(/'/g,"\\'")}', this)">
        <input type="checkbox" ${checked ? 'checked' : ''} onclick="event.stopPropagation()">
        ${e.nom}
      </label>`;
  }).join("");
}

function toggleEleve(id, nom, el) {
  const idx = selectedEleves.findIndex(s => s.id === id);
  if (idx >= 0) {
    selectedEleves.splice(idx, 1);
    el.classList.remove("checked");
    el.querySelector("input").checked = false;
  } else {
    selectedEleves.push({ id, nom });
    el.classList.add("checked");
    el.querySelector("input").checked = true;
  }
  afficherTags();
}

function retirerEleve(id) {
  selectedEleves = selectedEleves.filter(s => s.id !== id);
  afficherListeEleves(
    document.getElementById("search-eleve").value
      ? elevesClasse.filter(e => e.nom.toLowerCase().includes(document.getElementById("search-eleve").value.toLowerCase()))
      : elevesClasse
  );
  afficherTags();
}

function afficherTags() {
  const container = document.getElementById("selected-tags");
  const count = document.getElementById("eleves-count");
  container.innerHTML = selectedEleves.map(e =>
    `<span class="tag">${e.nom}<button onclick="retirerEleve(${e.id})" title="Retirer">×</button></span>`
  ).join("");
  count.textContent = selectedEleves.length > 0
    ? selectedEleves.length + " élève" + (selectedEleves.length > 1 ? "s" : "") + " sélectionné" + (selectedEleves.length > 1 ? "s" : "")
    : "";
}

/* ── Validation ── */
function valider() {
  let ok = true;
  const classe   = document.getElementById("sel-classe").value;
  const epreuve  = document.getElementById("sel-epreuve").value;
  const ens      = document.getElementById("sel-enseignant").value;
  const date     = document.getElementById("date-depot").value;

  if (!classe)  { showError("classe");    ok = false; } else clearError("classe");
  if (!epreuve) { showError("epreuve");   ok = false; } else clearError("epreuve");
  if (!ens)     { showError("enseignant");ok = false; } else clearError("enseignant");
  if (!date)    { showError("date");      ok = false; } else clearError("date");

  return ok ? { classe: parseInt(classe), epreuve: parseInt(epreuve), enseignant: parseInt(ens), date } : null;
}

function showError(id) {
  document.getElementById("sel-" + id || "date-depot")?.classList.add("error");
  document.getElementById("err-" + id)?.classList.add("visible");
}
function clearError(id) {
  document.getElementById("sel-" + id)?.classList.remove("error");
  document.getElementById("err-" + id)?.classList.remove("visible");
}

/* ── Sauvegarde ── */
async function sauvegarder() {
  const data = valider();
  if (!data) return;

  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "Enregistrement…";

  try {
    if (gristConnecte) {
      await grist.docApi.applyUserActions([["AddRecord", "StockageDocs", null, {
        la_classe:   data.classe,
        epreuve:     data.epreuve,
        enseignant:  data.enseignant,
        date_depot:  data.date,
        eleves_AB:   selectedEleves.map(e => e.id),
        commentaire: document.getElementById("commentaire").value.trim(),
        archive:     false
      }]]);
    }
    showToast("✓ Dépôt enregistré", "success");
    resetForm();
  } catch(e) {
    showToast("Erreur d'enregistrement", "error-t");
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = "Enregistrer le dépôt";
}

/* ── Reset ── */
function resetForm() {
  document.getElementById("sel-classe").value = "";
  document.getElementById("sel-epreuve").value = "";
  document.getElementById("sel-enseignant").value = "";
  document.getElementById("date-depot").valueAsDate = new Date();
  document.getElementById("commentaire").value = "";
  selectedEleves = [];
  elevesClasse = [];
  afficherTags();
  document.getElementById("eleves-list").innerHTML =
    '<div class="eleves-empty">Sélectionne d\'abord une classe.</div>';
  document.getElementById("search-eleve").disabled = true;
  document.getElementById("search-eleve").value = "";
  ["classe","epreuve","enseignant","date"].forEach(clearError);
}

/* ── Toast ── */
function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show " + type;
  setTimeout(() => { t.className = ""; }, 2800);
}

document.addEventListener("DOMContentLoaded", initGrist);
</script>
</body>
</html>
